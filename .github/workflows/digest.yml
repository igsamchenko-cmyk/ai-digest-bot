name: AI Digest
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-genai requests
      - run: python digest.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
